<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Four quadrants: purple/teal on diagonals -->
  <!-- Top-left: Purple (Curiosity) -->
  <path d="M64 64 L64 0 A64 64 0 0 0 0 64 Z" fill="#4C3FA0"/>
  <!-- Top-right: Teal (Collaboration) -->
  <path d="M64 64 L128 64 A64 64 0 0 0 64 0 Z" fill="#18B99A"/>
  <!-- Bottom-right: Purple (Critical Thinking) -->
  <path d="M64 64 L64 128 A64 64 0 0 0 128 64 Z" fill="#4C3FA0"/>
  <!-- Bottom-left: Teal (Communication) -->
  <path d="M64 64 L0 64 A64 64 0 0 0 64 128 Z" fill="#18B99A"/>
  <!-- Concentric rings -->
  <circle cx="64" cy="64" r="44" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="64" cy="64" r="28" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="10" fill="#FFFFFF"/>
</svg>
